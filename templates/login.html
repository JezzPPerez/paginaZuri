<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanzas JZ - Iniciar Sesión</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
            padding: 1rem;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            background-color: var(--bg-card);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-lg);
            padding: 2.5rem 2rem;
            animation: fadeIn 0.4s ease-out;
        }
        .login-logo {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
        }
        .login-logo-icon {
            width: 48px;
            height: 48px;
            background-color: var(--accent-light);
            color: var(--accent-blue);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            border: 1px solid rgba(59, 130, 246, 0.15);
        }
        .login-logo h2 {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: -0.5px;
        }
        .login-logo h2 span {
            color: var(--accent-blue);
        }
        .login-info-text {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-align: center;
            margin-top: -1.25rem;
            margin-bottom: 1.75rem;
        }
        .alert-error {
            background-color: var(--danger-bg);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 0.75rem 1rem;
            border-radius: var(--radius-md);
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-full {
            width: 100%;
            justify-content: center;
            padding: 0.75rem;
            font-size: 0.95rem;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">
            <div class="login-logo-icon">
                <i class="fa-solid fa-wallet"></i>
            </div>
            <h2>Finanzas<span> JZ</span></h2>
        </div>
        <p class="login-info-text">Ingresa tus credenciales para acceder a tu dashboard financiero personal.</p>

        {% if error %}
        <div class="alert-error">
            <i class="fa-solid fa-circle-exclamation"></i>
            <span>{{ error }}</span>
        </div>
        {% endif %}

        <form action="/login" method="POST">
            <div class="form-group">
                <label for="username"><i class="fa-solid fa-user"></i> Usuario</label>
                <input type="text" name="username" id="username" placeholder="Ingresa tu usuario" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="password"><i class="fa-solid fa-lock"></i> Contraseña</label>
                <input type="password" name="password" id="password" placeholder="Ingresa tu contraseña" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary btn-full">
                Iniciar Sesión <i class="fa-solid fa-arrow-right-to-bracket"></i>
            </button>
        </form>

    </div>
</body>
</html>
